name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          pytest --tb=short -q

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # iOS build intentionally excluded — Android only
  build-android-release:
    name: Build Android Release APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/android/**/*.gradle*', 'mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Validate Android resources
        working-directory: mobile/android
        run: |
          chmod +x validate-resources.sh
          ./validate-resources.sh

      - name: Create local.properties
        working-directory: mobile/android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon
        env:
          JAVA_OPTS: '-Xmx4g'

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: mobile/android/app/build/outputs/apk/release/app-release.apk

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-and-push, build-android-release]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: artifacts/

      - name: Generate changelog
        id: changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --pretty=format:"- %s (%h)")
          else
            COMMITS=$(git log --oneline --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.TAG }}
          name: MathLens AI ${{ steps.changelog.outputs.TAG }}
          files: artifacts/app-release.apk
          body: |
            ## MathLens AI ${{ steps.changelog.outputs.TAG }}

            ### 📱 Android APK
            Download **app-release.apk** from the release assets below and install on your Android device (API 24+).

            ### 🐳 Docker Image (Backend)
            ```
            ghcr.io/${{ github.repository }}/backend:${{ steps.changelog.outputs.TAG }}
            ```

            ### 🚀 Quick Start (Backend)
            ```bash
            # Pull and run with Docker Compose
            git clone https://github.com/${{ github.repository }}.git
            cd mathlens-ai
            OPENAI_API_KEY=<your-key> docker compose up
            ```

            ### 📋 Changes
            ${{ steps.changelog.outputs.CHANGELOG }}

            ### ✅ Backend API
            - `POST /api/v1/auth/register` — 사용자 등록
            - `POST /api/v1/auth/token` — JWT 로그인
            - `POST /api/v1/submissions` — 풀이 제출 (비동기 AI 분석)
            - `GET  /api/v1/submissions/{id}/status` — 처리 상태 조회
            - `POST /api/v1/analyze` — 동기 풀이 분석
            - `GET  /api/v1/problems` — 문제 목록
            - `GET  /api/v1/problems/recommend` — 개인화 문제 추천
            - `POST /api/v1/problems/generate` — AI 유사 문제 생성
            - `GET  /api/v1/users/{id}/report` — 학습 리포트
            - `GET  /api/v1/users/{id}/mastery` — 개념 습득 현황
            - `GET  /api/v1/concepts` — 개념 목록
            - `WS   /ws/v1/submissions/{id}` — 실시간 처리 상태 WebSocket
          draft: false
          prerelease: ${{ contains(steps.changelog.outputs.TAG, '-') }}
