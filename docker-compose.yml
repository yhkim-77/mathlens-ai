version: "3.9"

services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://mathlens:${POSTGRES_PASSWORD:-mathlens_dev}@db:5432/mathlens
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=false
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mathlens
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mathlens_dev}
      POSTGRES_DB: mathlens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathlens"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
